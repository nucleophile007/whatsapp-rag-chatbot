services:
  valkey:
    image: valkey/valkey
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - async_rag_network
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whatsapp_flows
      POSTGRES_USER: flowbuilder
      POSTGRES_PASSWORD: flowbuilder123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - async_rag_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flowbuilder -d whatsapp_flows" ]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: async_rag_frontend
    ports:
      - "5172:5173"
    environment:
      - VITE_PROXY_TARGET=http://server:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - async_rag_network
    depends_on:
      - server

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - async_rag_network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async_rag_server
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - WAHA_URL=http://waha:3000
      - WAHA_SESSION=default
      - WAHA_API_KEY=Yahoo
      - WAHA_WEBHOOK_URL=http://server:8000/whatsapp/webhook?waha_instance=default
      # - WAHA_INSTANCE_MAP={"default":{"url":"http://waha:3000","session":"default"},"default2":{"url":"http://waha2:3000","session":"default"}}
      - WAHA_INSTANCE_MAP={"default":{"url":"http://waha:3000","session":"default"}}
      - DATABASE_URL=postgresql://flowbuilder:flowbuilder123@postgres:5432/whatsapp_flows
      - RAG_GROUNDING_THRESHOLD=0.46
      - RAG_FINAL_CONTEXT_K=8
      - RAG_RETRIEVAL_CANDIDATES=22
      - RAG_REQUIRE_CITATIONS=false
      - CONVERSATION_MEMORY_SCOPE=client_workspace
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - valkey
      - qdrant
      - postgres
    networks:
      - async_rag_network
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async_rag_worker
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - SERVER_URL=http://async_rag_server:8000
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
      # WAHA (WhatsApp) Configuration
      - WAHA_URL=http://waha:3000
      - WAHA_SESSION=default
      - WAHA_API_KEY=Yahoo
      # - WAHA_INSTANCE_MAP={"default":{"url":"http://waha:3000","session":"default"},"default2":{"url":"http://waha2:3000","session":"default"}}
      - WAHA_INSTANCE_MAP={"default":{"url":"http://waha:3000","session":"default"}}
      - DATABASE_URL=postgresql://flowbuilder:flowbuilder123@postgres:5432/whatsapp_flows
      - RQ_WORKER_DEFAULT_COUNT=1
      - RQ_WORKER_MIN_COUNT=1
      - RQ_WORKER_MAX_COUNT=16
      - RQ_WORKER_DESIRED_KEY=rq:workers:desired_count
      - RQ_WORKER_MANAGER_HEARTBEAT_KEY=rq:workers:manager:heartbeat
      - RQ_WORKER_MANAGER_HEARTBEAT_TTL_SECONDS=15
      - RAG_GROUNDING_THRESHOLD=0.46
      - RAG_FINAL_CONTEXT_K=8
      - RAG_RETRIEVAL_CANDIDATES=22
      - RAG_REQUIRE_CITATIONS=false
      - CONVERSATION_MEMORY_SCOPE=client_workspace
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - valkey
      - qdrant
      - waha
      # - waha2
      - postgres
    networks:
      - async_rag_network
    command: python queues/worker_pool_manager.py

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    container_name: waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      WAHA_API_KEY: "Yahoo"
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      WAHA_WEBHOOK_URL: "http://server:8000/whatsapp/webhook?waha_instance=default"
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "secret123"
      WHATSAPP_SWAGGER_USERNAME: "admin"
      WHATSAPP_SWAGGER_PASSWORD: "secret123"
    volumes:
      - ./sessions:/app/.sessions
    networks:
      - async_rag_network

  # waha2:
  #   image: devlikeapro/waha:latest
  #   container_name: waha2
  #   restart: always
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     WAHA_API_KEY: "Yahoo"
  #     WHATSAPP_DEFAULT_ENGINE: "NOWEB"
  #     WAHA_WEBHOOK_URL: "http://server:8000/whatsapp/webhook?waha_instance=default2"
  #     WAHA_DASHBOARD_USERNAME: "admin"
  #     WAHA_DASHBOARD_PASSWORD: "secret123"
  #     WHATSAPP_SWAGGER_USERNAME: "admin"
  #     WHATSAPP_SWAGGER_PASSWORD: "secret123"
  #   volumes:
  #     - ./sessions2:/app/.sessions
  #   networks:
  #     - async_rag_network

networks:
  async_rag_network:
    driver: bridge

volumes:
  qdrant_storage:
  postgres_data:
