services:
  valkey:
    image: valkey/valkey
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - async_rag_network
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whatsapp_flows
      POSTGRES_USER: flowbuilder
      POSTGRES_PASSWORD: flowbuilder123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - async_rag_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U flowbuilder" ]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: async_rag_frontend
    ports:
      - "5172:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - async_rag_network
    depends_on:
      - server

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - async_rag_network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async_rag_server
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql://flowbuilder:flowbuilder123@postgres:5432/whatsapp_flows
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - valkey
      - qdrant
      - postgres
    networks:
      - async_rag_network
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: async_rag_worker
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
      - SERVER_URL=http://async_rag_server:8000
      - OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES
      # WAHA (WhatsApp) Configuration
      - WAHA_URL=http://waha:3000
      - WAHA_API_KEY=Yahoo
      - DATABASE_URL=postgresql://flowbuilder:flowbuilder123@postgres:5432/whatsapp_flows
      - RQ_WORKER_DEFAULT_COUNT=1
      - RQ_WORKER_MIN_COUNT=1
      - RQ_WORKER_MAX_COUNT=16
      - RQ_WORKER_DESIRED_KEY=rq:workers:desired_count
      - RQ_WORKER_MANAGER_HEARTBEAT_KEY=rq:workers:manager:heartbeat
      - RQ_WORKER_MANAGER_HEARTBEAT_TTL_SECONDS=15
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - valkey
      - qdrant
      - waha
      - postgres
    networks:
      - async_rag_network
    command: python queues/worker_pool_manager.py

  waha:
    image: devlikeapro/waha:latest
    container_name: waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      WAHA_API_KEY: "Yahoo"
      WHATSAPP_DEFAULT_ENGINE: "NOWEB"
      WAHA_WEBHOOK_URL: "http://server:8000/whatsapp/webhook"
      WAHA_DASHBOARD_USERNAME: "admin"
      WAHA_DASHBOARD_PASSWORD: "secret123"
      WHATSAPP_SWAGGER_USERNAME: "admin"
      WHATSAPP_SWAGGER_PASSWORD: "secret123"
    volumes:
      - ./sessions:/app/.sessions
    networks:
      - async_rag_network

networks:
  async_rag_network:
    driver: bridge

volumes:
  qdrant_storage:
  postgres_data:

